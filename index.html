<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鸡尾酒酒单</title>
  <style>
    :root {
      --bg: #0d0b09;
      --panel: rgba(255,255,255,0.075);
      --panel-2: rgba(255,255,255,0.11);
      --text: #f8efe2;
      --muted: #b7aa99;
      --gold: #d7a84f;
      --line: rgba(215,168,79,0.25);
      --shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(215,168,79,.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(122,25,25,.28), transparent 38%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 56px 20px 28px;
      text-align: center;
    }

    .eyebrow {
      color: var(--gold);
      letter-spacing: .22em;
      text-transform: uppercase;
      font-size: 12px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 8vw, 74px);
      line-height: 1;
      font-weight: 800;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 16px;
      font-size: 15px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(18px);
      background: rgba(13,11,9,.82);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 14px 16px;
    }

    .toolbar-inner {
      max-width: 1100px;
      margin: auto;
      display: grid;
      gap: 12px;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 15px;
      outline: none;
    }

    .search::placeholder { color: #8f8272; }

    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .filter {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 14px;
      white-space: nowrap;
      cursor: pointer;
      font-size: 13px;
    }

    .filter.active {
      background: var(--gold);
      color: #17110a;
      border-color: var(--gold);
      font-weight: 700;
    }

    main {
      max-width: 1100px;
      margin: auto;
      padding: 28px 16px 64px;
    }

    .count {
      color: var(--muted);
      margin: 0 0 18px;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 20px;
      box-shadow: var(--shadow);
      min-height: 210px;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .name {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
    }

    .zh {
      color: var(--muted);
      margin-top: 6px;
      font-size: 14px;
    }

    .tag {
      color: #1b1206;
      background: var(--gold);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
    }

    li {
      color: #e7d8c2;
      border-top: 1px solid rgba(255,255,255,.08);
      padding-top: 8px;
      font-size: 14px;
    }

    .empty {
      display: none;
      text-align: center;
      color: var(--muted);
      padding: 48px 12px;
      border: 1px dashed var(--line);
      border-radius: 20px;
    }

    footer {
      text-align: center;
      color: #796d60;
      padding: 20px;
      font-size: 12px;
    }
  </style>
</head>
<body>

      <div id="filters" class="filters"></div>
    </div>

    <section id="grid" class="grid"></section>

    const baseLabels = {
      All: "全部",
      Gin: "金酒",
      Vodka: "伏特加",
      Whiskey: "威士忌",
      Rum: "朗姆",
      Tequila: "龙舌兰",
      Campari: "Campari",
      Cognac: "干邑",
      Pisco: "皮斯科",
      Bitters: "苦精",
      Mixed: "混合基酒"
    };

    let currentBase = "All";

    const grid = document.getElementById("grid");
    const search = document.getElementById("search");
    const filters = document.getElementById("filters");
    const count = document.getElementById("count");
    const empty = document.getElementById("empty");

    function uniqueBases() {
      const preferred = ["All", "Gin", "Vodka", "Whiskey", "Rum", "Tequila", "Campari", "Cognac", "Pisco", "Bitters", "Mixed"];
      const actual = new Set(cocktails.map(c => c.base));
      return preferred.filter(b => b === "All" || actual.has(b));
    }

    function renderFilters() {
      filters.innerHTML = uniqueBases().map(base => `
        <button class="filter ${base === currentBase ? "active" : ""}" data-base="${base}">
          ${baseLabels[base] || base}
        </button>
      `).join("");

      document.querySelectorAll(".filter").forEach(btn => {
        btn.addEventListener("click", () => {
          currentBase = btn.dataset.base;
          renderFilters();
          renderMenu();
        });
      });
    }

    function matchCocktail(cocktail, keyword) {
      const haystack = [
        cocktail.name,
        cocktail.zh,
        cocktail.base,
        ...(cocktail.ingredients || [])
      ].join(" ").toLowerCase();

      return haystack.includes(keyword.toLowerCase());
    }

    function renderMenu() {
      const keyword = search.value.trim();

      const filtered = cocktails.filter(c => {
        const baseOk = currentBase === "All" || c.base === currentBase;
        const searchOk = !keyword || matchCocktail(c, keyword);
        return baseOk && searchOk;
      });

      count.textContent = `当前显示 ${filtered.length} / ${cocktails.length} 款鸡尾酒`;

      grid.innerHTML = filtered.map(c => `
        <article class="card">
          <div class="card-top">
            <div>
              <h2 class="name">${c.name}</h2>
              ${c.zh ? `<div class="zh">${c.zh}</div>` : ""}
            </div>
            <span class="tag">${baseLabels[c.base] || c.base}</span>
          </div>
          <ul>
            ${c.ingredients.map(i => `<li>${i}</li>`).join("")}
          </ul>
        </article>
      `).join("");

      empty.style.display = filtered.length ? "none" : "block";
    }

    search.addEventListener("input", renderMenu);

    renderFilters();
    renderMenu();
  </script>

</html>
