﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>经典鸡尾酒酒单</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 页面头部：展示酒单标题和简短说明。 -->
  <header>
    <div class="eyebrow">Cocktail Menu</div>
    <h1>鸡尾酒酒单</h1>
    <div class="subtitle">以下配方仅供参考</div>
  </header>

  <!-- 工具栏：搜索输入框和基酒分类按钮由脚本动态渲染。 -->
  <section class="toolbar">
    <div class="toolbar-inner">
      <input id="search" class="search" placeholder="搜索酒名、基酒或材料" />
      <div id="filters" class="filters"></div>
    </div>
  </section>

  <!-- 酒单列表：卡片内容、数量和空状态都由脚本根据筛选结果更新。 -->
  <main>
    <p id="count" class="count"></p>
    <section id="grid" class="grid"></section>
    <section id="empty" class="empty">没有找到对应鸡尾酒。</section>
  </main>

  <footer>0.0</footer>
  <script src="script.js"></script>
</body>
</html>
